apiVersion: v1
kind: Pod
metadata:
  name: abctech
  labels:
    app: web
spec:
  containers:
    - name: myabcontainer
      image: kalaivanipachaiappan/abctech:5
---
apiVersion: v1
kind: Service
metadata:
  name: abctech-svc
spec:
  selector:
    app: web
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
  type: NodePort